name: Build and Push Docker Image

on:
  # Allow manual trigger
  workflow_dispatch:

  # Daily rebuild at 2 AM UTC
  schedule:
    - cron: "0 2 * * *"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/agents-image

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - variant: ubuntu
            dockerfile: Dockerfile
            suffix: ""
          - variant: ubi
            dockerfile: Dockerfile.ubi
            suffix: "-ubi"

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            suffix=${{ matrix.suffix }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-
            type=ref,event=pr

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
          build-args: |
            CACHEBUST=${{ github.run_id }}

      - name: Image digest
        run: echo "Image (${{ matrix.variant }}) built and pushed successfully!"

  update-versions:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tool versions from image
        run: |
          docker pull --platform linux/amd64 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker run --rm --platform linux/amd64 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest bash -c '
            jq -n \
              --arg node "$(node --version | tr -d v)" \
              --arg codex "$(codex --version 2>&1 | head -1)" \
              --arg claude "$(claude --version 2>&1 | head -1)" \
              --arg gemini "$(gemini --version 2>&1 | head -1)" \
              --arg opencode "$(opencode --version 2>&1 | head -1)" \
              --arg sg "$(sg --version 2>&1 | head -1)" \
              --arg yq "$(yq --version 2>&1 | head -1)" \
              --arg gh "$(gh --version 2>&1 | head -1)" \
              --arg glab "$(glab --version 2>&1 | head -1)" \
              --arg kubectl "$(kubectl version --client 2>&1 | head -1)" \
              --arg stern "$(stern --version 2>&1 | head -1)" \
              --arg rg "$(rg --version 2>&1 | head -1)" \
              --arg fd "$(fd --version 2>&1 | head -1)" \
              --arg jq "$(jq --version 2>&1)" \
              --arg shellcheck "$(shellcheck --version 2>&1 | grep version: | awk '"'"'{print $2}'"'"')" \
              '"'"'{node:$node,codex:$codex,claude:$claude,gemini:$gemini,opencode:$opencode,sg:$sg,yq:$yq,gh:$gh,glab:$glab,kubectl:$kubectl,stern:$stern,rg:$rg,fd:$fd,jq:$jq,shellcheck:$shellcheck}'"'"'
          ' > version.json
          jq --arg ts "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            '{updated: $ts} + .' version.json > version.json.tmp
          mv version.json.tmp version.json

      - name: Commit and push version.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update version.json"
            git push
          fi
